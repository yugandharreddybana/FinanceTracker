# Spring Profile: dev
# Use H2 embedded database for local development

# DataSource
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false;INIT=CREATE SCHEMA IF NOT EXISTS finance_app
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=finance_app
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# SQL init
spring.sql.init.mode=never

# Actuator
management.health.db.enabled=true
