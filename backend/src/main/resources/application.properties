# Server
server.port=${PORT:8080}

# CORS — only allow the Node.js middleware, never the frontend directly
ALLOWED_ORIGINS=${ALLOWED_ORIGINS:http://localhost:4000}

# Supabase PostgreSQL (Transaction Mode pooler - port 6543 recommended for serverless)
spring.datasource.url=${DB_URL}&currentSchema=finance_app
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.initializationFailTimeout=0
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.datasource.hikari.connection-init-sql=SET search_path TO finance_app

# JPA / Hibernate
# DDL_AUTO: use "update" for initial deploy (creates tables), "validate" once schema is stable
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=finance_app
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Jackson
spring.jackson.default-property-inclusion=non-null
spring.jackson.serialization.write-dates-as-timestamps=false

# SQL init — ONLY creates the finance_app schema namespace, nothing destructive
# Safe to run on every deploy because schema.sql uses CREATE SCHEMA IF NOT EXISTS
spring.sql.init.mode=always

# Actuator
management.endpoints.web.exposure.include=health
management.health.db.enabled=true
management.endpoint.health.show-details=when-authorized

# Flyway
spring.flyway.enabled=true
spring.flyway.schemas=finance_app
spring.flyway.default-schema=finance_app
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
